services:
  - type: web
    name: csese-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: csese-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: FIRST_ADMIN_EMAIL
        value: "admin@csese.org"
      - key: FIRST_ADMIN_PASSWORD
        value: "changeme123"

databases:
  - name: csese-db
    databaseName: csese
    user: csese_user
